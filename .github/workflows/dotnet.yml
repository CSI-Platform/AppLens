name: Desktop CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AppLensDesktop.sln

      - name: Build
        run: dotnet build AppLensDesktop.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AppLensDesktop.sln --configuration Release --no-restore

